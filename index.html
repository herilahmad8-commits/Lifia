<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>someone special</title>
<style>
  :root{
    --cream:#fdf3ef;
    --blush:#f6c9d3;
    --rose:#e08aa1;
    --deep:#a44a64;
    --gold:#d9a45c;
    --ink:#4a2f3a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{
    height:100%;
    width:100%;
    overflow:hidden;
    background:linear-gradient(160deg, var(--cream) 0%, var(--blush) 60%, var(--rose) 100%);
    font-family: 'Georgia', 'Times New Roman', serif;
  }
  #stage{
    position:relative;
    height:100vh;
    width:100vw;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .layer{
    position:absolute;
    inset:0;
    pointer-events:none;
  }

  /* Floating hearts */
  .heart{
    position:absolute;
    bottom:-10vh;
    font-size:24px;
    color:var(--deep);
    opacity:0;
    animation: floatUp linear infinite;
    filter: drop-shadow(0 2px 3px rgba(164,74,100,0.25));
  }
  @keyframes floatUp{
    0%{ transform: translateY(0) translateX(0) rotate(0deg) scale(0.6); opacity:0; }
    10%{ opacity:0.9; }
    50%{ transform: translateY(-55vh) translateX(var(--drift,20px)) rotate(15deg) scale(1); }
    90%{ opacity:0.7; }
    100%{ transform: translateY(-110vh) translateX(calc(var(--drift,20px) * -1)) rotate(-10deg) scale(0.5); opacity:0; }
  }

  /* Falling petals */
  .petal{
    position:absolute;
    top:-8vh;
    width:14px;
    height:14px;
    background: radial-gradient(circle at 30% 30%, #ffffff, var(--blush) 60%, var(--rose));
    border-radius: 0 60% 0 60%;
    opacity:0;
    animation: fallDown linear infinite;
  }
  @keyframes fallDown{
    0%{ transform: translateY(0) translateX(0) rotate(0deg); opacity:0; }
    8%{ opacity:0.95; }
    100%{ transform: translateY(115vh) translateX(var(--sway,30px)) rotate(360deg); opacity:0.2; }
  }

  /* Center content */
  .center{
    position:relative;
    z-index:5;
    text-align:center;
    padding:0 24px;
  }
  .flower-frame{
    width:120px;
    height:120px;
    margin:0 auto 18px;
    position:relative;
    animation: bloom 1.8s ease-out forwards;
    transform-origin:center;
  }
  @keyframes bloom{
    0%{ transform:scale(0) rotate(-30deg); opacity:0; }
    70%{ transform:scale(1.08) rotate(4deg); opacity:1; }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }
  .petal-shape{
    position:absolute;
    width:54px;
    height:54px;
    left:33px;
    top:33px;
    background: linear-gradient(135deg, #ffffff, var(--blush));
    border-radius: 50% 0 50% 0;
    box-shadow: 0 0 12px rgba(224,138,161,0.5);
  }
  .petal-shape:nth-child(1){ transform: rotate(0deg) translateY(-30px); }
  .petal-shape:nth-child(2){ transform: rotate(72deg) translateY(-30px); }
  .petal-shape:nth-child(3){ transform: rotate(144deg) translateY(-30px); }
  .petal-shape:nth-child(4){ transform: rotate(216deg) translateY(-30px); }
  .petal-shape:nth-child(5){ transform: rotate(288deg) translateY(-30px); }
  .flower-core{
    position:absolute;
    width:34px;
    height:34px;
    left:43px;
    top:43px;
    border-radius:50%;
    background: radial-gradient(circle, #fff3d6, var(--gold));
    box-shadow: 0 0 16px rgba(217,164,92,0.7);
  }

  .eyebrow{
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--deep);
    opacity:0;
    animation: fadeUp 1s ease-out 1.4s forwards;
  }
  .title{
    font-family: 'Brush Script MT', 'Segoe Script', cursive, 'Georgia', serif;
    font-size: clamp(40px, 11vw, 78px);
    color: var(--deep);
    margin-top: 6px;
    opacity:0;
    text-shadow: 0 2px 18px rgba(224,138,161,0.45);
    animation: fadeUp 1.2s ease-out 1.7s forwards;
  }
  .sub{
    margin-top: 14px;
    font-size: 15px;
    color: var(--ink);
    opacity:0;
    letter-spacing: 0.5px;
    animation: fadeUp 1s ease-out 2.3s forwards;
  }
  .footer{
    position:absolute;
    bottom: 18px;
    left:0;
    right:0;
    text-align:center;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 1px;
    color: var(--deep);
    opacity:0;
    z-index:5;
    animation: fadeUp 1s ease-out 2.6s forwards;
  }
  .name{
    margin-top: 2px;
    font-family: 'Georgia', serif;
    font-size: clamp(20px, 5.5vw, 30px);
    font-weight: bold;
    color: var(--deep);
    opacity:0;
    letter-spacing: 0.5px;
    animation: fadeUp 1.1s ease-out 2.0s forwards;
  }
  @keyframes fadeUp{
    from{ opacity:0; transform: translateY(16px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .glow{
    position:absolute;
    width:340px;
    height:340px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(255,255,255,0.55), rgba(246,201,211,0) 70%);
    top:50%;
    left:50%;
    transform: translate(-50%,-50%);
    z-index:1;
    animation: pulse 4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{ opacity:0.6; transform: translate(-50%,-50%) scale(1); }
    50%{ opacity:1; transform: translate(-50%,-50%) scale(1.1); }
  }
</style>
</head>
<body>
<div id="stage">
  <div class="glow"></div>
  <div class="layer" id="hearts"></div>
  <div class="layer" id="petals"></div>

  <div class="center">
    <div class="flower-frame">
      <div class="petal-shape"></div>
      <div class="petal-shape"></div>
      <div class="petal-shape"></div>
      <div class="petal-shape"></div>
      <div class="petal-shape"></div>
      <div class="flower-core"></div>
    </div>
    <div class="eyebrow">untuk kamu</div>
    <div class="title">someone special</div>
    <div class="sub">dengan sepenuh hati 💌</div>
  </div>

  <div class="footer">Alifia Nur Okthary</div>
</div>

<script>
  const heartsLayer = document.getElementById('hearts');
  const petalsLayer = document.getElementById('petals');
  const heartSymbols = ['❤','💗','💕'];

  function spawnHeart(){
    const el = document.createElement('div');
    el.className = 'heart';
    el.textContent = heartSymbols[Math.floor(Math.random()*heartSymbols.length)];
    const left = Math.random()*100;
    const duration = 6 + Math.random()*5;
    const drift = (Math.random()*80 - 40) + 'px';
    const size = 16 + Math.random()*22;
    el.style.left = left + 'vw';
    el.style.fontSize = size + 'px';
    el.style.setProperty('--drift', drift);
    el.style.animationDuration = duration + 's';
    heartsLayer.appendChild(el);
    setTimeout(()=> el.remove(), duration*1000 + 200);
  }

  function spawnPetal(){
    const el = document.createElement('div');
    el.className = 'petal';
    const left = Math.random()*100;
    const duration = 7 + Math.random()*6;
    const sway = (Math.random()*60 - 30) + 'px';
    const size = 10 + Math.random()*10;
    el.style.left = left + 'vw';
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.setProperty('--sway', sway);
    el.style.animationDuration = duration + 's';
    petalsLayer.appendChild(el);
    setTimeout(()=> el.remove(), duration*1000 + 200);
  }

  for(let i=0;i<10;i++) setTimeout(spawnHeart, i*250);
  for(let i=0;i<14;i++) setTimeout(spawnPetal, i*200);

  setInterval(spawnHeart, 600);
  setInterval(spawnPetal, 450);
</script>
</body>
</html>
